name: Build Dashboard

on:
  schedule:
    # 01:47 UTC = 03:47 Madrid en verano (CEST) / 02:47 Madrid en invierno (CET). Hora rara + madrugada → GitHub Actions cumple casi siempre
    - cron: '47 1 * * *'
  workflow_dispatch: {}  # allow manual trigger from GitHub UI

permissions:
  contents: write  # allow committing/pushing the updated index.html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build dashboard
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          BUDGETS_JSON: scripts/budgets.json
          OUTPUT_HTML: index.html
        run: python scripts/build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

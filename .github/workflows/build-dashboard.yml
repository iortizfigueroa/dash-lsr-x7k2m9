name: Build Dashboard

on:
  schedule:
    # 7:00 UTC = 8:00 in Madrid summer time (CEST) / 8:00 winter (CET) the UTC offset shifts but we use 7 to be roughly 8am Madrid most of year. 
    # Adjust to '0 6 * * *' if you want consistent 8am Madrid winter time too.
    - cron: '0 7 * * *'
  workflow_dispatch: {}  # allow manual trigger from GitHub UI

permissions:
  contents: write  # allow committing/pushing the updated index.html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build dashboard
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          BUDGETS_JSON: scripts/budgets.json
          OUTPUT_HTML: index.html
        run: python scripts/build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
